# Build CoPaw macOS DMG on release and attach to the GitHub Release.
# Users can download CoPaw-<version>.dmg from the release page.
# Compatible with macOS 10.15+ (Catalina and later; Intel and Apple Silicon).
#
# NOTE:
# - Without a real "Developer ID Application" certificate + notarization,
#   Gatekeeper may still warn. Ad-hoc signing helps but does not replace notarization.
# - PyInstaller apps contain folders like _internal/python3.10 that are NOT valid
#   macOS bundles. Therefore DO NOT use `codesign --deep` and DO NOT sign the whole
#   .app bundle here (that can still recurse into invalid subcomponents).
name: Release macOS DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version or tag"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install librsvg (for correct app icon rendering)
        run: brew install librsvg

      - name: Build console frontend
        run: |
          cd console && npm ci && npm run build

      - name: Copy console into package
        run: |
          rm -rf src/copaw/console
          mkdir -p src/copaw/console
          cp -R console/dist/* src/copaw/console/

      - name: Install Python deps and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          VERSION_ARG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          if [[ -n "$VERSION_ARG" ]]; then
            bash scripts/macos/build_dmg.sh "$VERSION_ARG"
          else
            bash scripts/macos/build_dmg.sh
          fi

      - name: Ad-hoc sign Mach-O files and recreate DMG (no app-bundle signing)
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="dist/CoPaw.app"
          DMG_GLOB="dist/CoPaw-*.dmg"

          [[ -d "$APP_DIR" ]] || { echo "No $APP_DIR found" >&2; exit 1; }

          # Remove packaging metadata that is irrelevant at runtime (optional)
          find "$APP_DIR" -type d -name "*.dist-info" -print0 | xargs -0 rm -rf || true

          # Some packages include marker files like py.typed; not signable, safe to keep,
          # but deleting reduces any chance of odd subcomponent checks.
          find "$APP_DIR" -type f -name "py.typed" -delete || true

          # Sign ONLY Mach-O binaries (executables / dylibs / python extension modules).
          # This avoids `codesign` trying to treat PyInstaller directories (e.g. python3.10)
          # as nested bundles, which causes "bundle format unrecognized".
          while IFS= read -r -d '' f; do
            if file -b "$f" | grep -q 'Mach-O'; then
              codesign --force --sign - "$f"
            fi
          done < <(find "$APP_DIR" -type f -print0)

          # Recreate DMG so it contains the signed binaries
          DMG_NAME="$(ls $DMG_GLOB 2>/dev/null | head -1 || true)"
          [[ -n "${DMG_NAME:-}" ]] || { echo "No DMG found" >&2; exit 1; }

          VERSION="$(basename "$DMG_NAME" .dmg | sed 's/^CoPaw-//')"
          rm -f "$DMG_NAME"

          hdiutil create -volname "CoPaw $VERSION" -srcfolder "$APP_DIR" \
            -ov -format UDZO "$DMG_NAME"

      - name: Upload DMG to Release
        if: github.event_name == 'release' && github.event.action == 'published'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.dmg --clobber

      - name: Upload DMG (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-macOS-DMG
          path: dist/*.dmg
