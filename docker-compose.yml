version: '3.8'

volumes:
  copaw-data:
    name: copaw-data
  copaw-secrets:
    name: copaw-secrets

networks:
  copaw-network:
    driver: bridge

services:
  # Backend service
  copaw:
    image: agentscope/copaw:latest
    container_name: copaw
    restart: always
    ports:
      - "8088:8088"
    volumes:
      - copaw-data:/app/working
      - copaw-secrets:/app/working.secret
    environment:
      - COPAW_AUTH_ENABLED=true
    networks:
      - copaw-network

  # Nginx gateway (serves static dist files directly)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: copaw-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./console/dist:/var/www/console:ro
      - ./website/dist:/var/www/website:ro
    networks:
      - copaw-network
    depends_on:
      - copaw
